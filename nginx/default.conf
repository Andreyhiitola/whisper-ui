server {
    listen 80;
    client_max_body_size 500M;
    
    # Отключаем буферизацию для больших аудиофайлов
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /asr {
        proxy_pass http://whisper:9000/asr;
        proxy_read_timeout 3600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /asr-fast {
        proxy_pass http://whisper-fast:9000/asr;
        proxy_read_timeout 3600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
