services:
  amnezia-vpn:
    image: amneziavpn/amnezia-wg:latest
    container_name: amnezia-vpn
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./config:/etc/amneziawg
      - /lib/modules:/lib/modules:ro
    ports:
      - 1080:1080/tcp
    command: ["/bin/sh", "-c", "wg-quick up /etc/amneziawg/awg0.conf && sleep infinity"]
