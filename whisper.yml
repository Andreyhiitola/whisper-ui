services:
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=small
      - ASR_ENGINE=openai_whisper
    volumes:
      - /srv/dev-disk-by-uuid-e3906cb9-c585-4088-9de4-278d2769849e/wisper_:/root/.cache/whisper
    restart: unless-stopped

  whisper-fast:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-fast
    ports:
      - "9001:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    volumes:
      - /srv/dev-disk-by-uuid-e3906cb9-c585-4088-9de4-278d2769849e/wisper_:/root/.cache/whisper
    restart: unless-stopped

  whisper-ui:
    image: nginx:alpine
    container_name: whisper-ui
    ports:
      - "8443:443"
    volumes:
      - /srv/dev-disk-by-uuid-e3906cb9-c585-4088-9de4-278d2769849e/whisper_ui/html:/usr/share/nginx/html:ro
      - /srv/dev-disk-by-uuid-e3906cb9-c585-4088-9de4-278d2769849e/whisper_ui/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/dev-disk-by-uuid-e3906cb9-c585-4088-9de4-278d2769849e/whisper_ui/ssl:/etc/nginx/ssl:ro
    depends_on:
      - whisper
    restart: unless-stopped
